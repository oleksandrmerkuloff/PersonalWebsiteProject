{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oleksandr Merkulov{% endblock title %}</title>
    
    <!-- Base styles are loaded on EVERY page -->
    <link rel="stylesheet" href="{% static 'base.css' %}">
    
    <!-- Child templates will inject their own target CSS file here -->
    {% block extra_css %}{% endblock extra_css %}
</head>
<body>

    <div class="site-wrapper">
        <header>
            <div class="logo">
                <a href="{% url 'home' %}">Oleksandr Merkulov</a>
            </div>
            <nav>
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'post-list' %}">Blog</a>
                <a href="{% url 'projects-list' %}">Projects</a>
                <a href="{% url 'contacts' %}">Contacts</a>
            </nav>
        </header>

        <main>
            {% block content %}
            {% endblock content %}
        </main>

        <footer>
            <p>&copy; {% now "Y" %} Oleksandr Merkulov</p>
        </footer>
    </div>

</body>
</html>
